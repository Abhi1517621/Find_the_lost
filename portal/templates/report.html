<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Report {{ log_type }} | IIT Indore</title>
    <style>
        body { background-color: #0f172a; color: #f8fafc; padding-top: 50px; padding-bottom: 50px; }
        .glass-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.5s ease-out;
        }
        .form-control, .form-select { background: #0f172a; border: 1px solid #334155; color: #f8fafc; }
        .form-control:focus, .form-select:focus { background: #0f172a; color: white; border-color: #38bdf8; box-shadow: 0 0 0 0.25rem rgba(56, 189, 248, 0.25); }
        .btn-submit { background: #38bdf8; color: #0f172a; font-weight: bold; border: none; }
        .btn-submit:hover { background: #0284c7; color: white; }
        
        /* OVERRIDES FOR DARK MODE CONTRAST */
        .text-muted { color: #94a3b8 !important; } 
        .form-control::placeholder, .form-select::placeholder { color: #64748b !important; opacity: 1; }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="d-flex align-items-center mb-4">
                    <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary btn-sm me-3">&larr; Back to Dashboard</a>
                    <h3 class="mb-0 fw-bold">Log <span class="{% if log_type == 'Lost' %}text-danger{% else %}text-success{% endif %}">{{ log_type }}</span> Asset</h3>
                </div>
                
                <div class="glass-card p-4 p-md-5">
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold text-uppercase">Asset Title / Name</label>
                            <input type="text" name="title" class="form-control form-control-lg" required placeholder="e.g., iPhone 13 Blue">
                        </div>
                        
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label text-muted small fw-bold text-uppercase">Category</label>
                                <select name="category" class="form-select" required>
                                    <option value="Electronics">Electronics</option>
                                    <option value="ID/Wallet">ID/Wallet/Cards</option>
                                    <option value="Books">Books/Stationery</option>
                                    <option value="Keys">Keys</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted small fw-bold text-uppercase">Location {{ log_type }}</label>
                                <input type="text" name="location" class="form-control" required placeholder="e.g., Library 2nd Floor">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold text-uppercase">Detailed Description</label>
                            <textarea name="description" class="form-control" rows="4" required placeholder="Include unique identifiers, scratches, colors..."></textarea>
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-muted small fw-bold text-uppercase">Image Proof (Optional)</label>
                            <input type="file" name="image" class="form-control" accept="image/*">
                        </div>

                        <button type="submit" class="btn btn-submit w-100 py-3">Submit to Ledger</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
