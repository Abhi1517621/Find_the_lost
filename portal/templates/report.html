<!DOCTYPE html>
<html><head><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="bg-light"><div class="container py-5"><div class="card p-4 mx-auto" style="max-width: 600px;">
    <div class="d-flex justify-content-between mb-3">
        <h4>Report a {{ log_type }} Item</h4>
<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    <input type="text" name="title" class="form-control mb-3" placeholder="Title (e.g. Blue iPhone 13)" required>
    <textarea name="description" class="form-control mb-3" placeholder="Detailed description..." required></textarea>
    <input type="text" name="category" class="form-control mb-3" placeholder="Category (Electronics, Keys...)" required>
    <input type="text" name="location" class="form-control mb-3" placeholder="Where was it {{ log_type|lower }}?" required>
    <!-- Removed the select dropdown! -->
    <label>Upload Image Proof:</label>
    <input type="file" name="image" class="form-control mb-3">
    <button type="submit" class="btn btn-primary w-100">Submit {{ log_type }} Log</button>
</form>
</div></div></body></html>
