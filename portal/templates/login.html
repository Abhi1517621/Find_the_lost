<!DOCTYPE html>
<html><head><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="bg-light"><div class="container py-5"><div class="card p-4 mx-auto" style="max-width: 400px;">
    <h4 class="mb-3">Portal Login</h4>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>
    <p class="mt-3">No account? <a href="{% url 'register' %}">Register here (@iiti.ac.in only)</a></p>
</div></div></body></html>
