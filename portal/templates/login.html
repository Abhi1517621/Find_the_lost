{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Login | IIT Indore</title>
    <style>
        body { 
            /* Premium dark overlay combined with the campus background image */
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.85)), url('{% static "images/campus.jpeg" %}');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #f8fafc; 
            display: flex; 
            align-items: center; 
            min-height: 100vh; 
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.5); /* More transparent to show blur */
            backdrop-filter: blur(16px);       /* Heavy frosted glass effect */
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            animation: fadeInUp 0.6s ease-out;
        }
        .form-control { background: rgba(15, 23, 42, 0.7); border: 1px solid #334155; color: #f8fafc; }
        .form-control:focus { background: rgba(15, 23, 42, 0.9); border-color: #38bdf8; color: #f8fafc; box-shadow: 0 0 0 0.25rem rgba(56, 189, 248, 0.25); }
        .btn-custom { background: #38bdf8; color: #0f172a; font-weight: 600; border: none; }
        .btn-custom:hover { background: #0284c7; color: white; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="glass-card p-5 text-center">
                    <img src="{% static 'images/logo.png' %}" alt="Logo" height="60" class="bg-white rounded p-1 mb-4 shadow">
                    <h3 class="fw-bold mb-4">Login</h3>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="text-start mb-4">
                            {{ form.as_p }}
                        </div>
                        <button type="submit" class="btn btn-custom w-100 py-2 mb-3 shadow-sm">Login</button>
                    </form>
                    <p class="text-light small">Don't have an account? <a href="{% url 'register' %}" class="text-info text-decoration-none fw-bold">Register</a></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
