{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Register | IIT Indore</title>
    <style>
        body { 
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.9)), url('{% static "images/campus.jpg" %}');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #0f172a; 
            color: #f8fafc; 
            display: flex; 
            align-items: center; 
            min-height: 100vh; 
            padding: 40px 0;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.6s ease-out;
        }
        /* UPDATED: Added input[type="number"] to target Year of study */
        .form-control, input[type="text"], input[type="password"], input[type="email"], input[type="number"], select { 
            background: rgba(15, 23, 42, 0.8); 
            border: 1px solid #334155; 
            color: #f8fafc; 
            width: 100%; 
            padding: 8px 12px; 
            border-radius: 6px; 
            margin-bottom: 15px;
        }
        .form-control:focus, input:focus, select:focus { 
            outline: none; 
            border-color: #38bdf8; 
            box-shadow: 0 0 0 0.25rem rgba(56, 189, 248, 0.25); 
            background: rgba(15, 23, 42, 0.9); 
        }
        /* Ensure dropdown options are readable in dark mode */
        select option {
            background: #0f172a;
            color: #f8fafc;
        }
        .btn-custom { background: #38bdf8; color: #0f172a; font-weight: 600; border: none; }
        .btn-custom:hover { background: #0284c7; color: white; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="glass-card p-5">
                    <div class="text-center mb-4">
                        <img src="{% static 'images/logo.png' %}" alt="Logo" height="60" class="bg-white rounded p-1 mb-3 shadow">
                        <h3 class="fw-bold">Create Institutional Account</h3>
                        <p class="text-light small">Must use valid @iiti.ac.in domain.</p>
                    </div>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="text-start">
                            {{ form.as_p }}
                        </div>
                        <button type="submit" class="btn btn-custom w-100 py-2 mt-3 mb-3 shadow-sm">Register</button>
                    </form>
                    <p class="text-center text-light small">Already registered? <a href="{% url 'login' %}" class="text-info text-decoration-none fw-bold">Login</a></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
