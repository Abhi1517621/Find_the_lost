<!DOCTYPE html>
<html><head><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="bg-light"><div class="container py-5"><div class="card p-4 mx-auto" style="max-width: 400px;">
    <h4 class="mb-3">Secure Registration</h4>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success w-100">Register</button>
    </form>
    <p class="mt-3">Already registered? <a href="{% url 'login' %}">Login</a></p>
</div></div></body></html>
